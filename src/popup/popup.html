<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkLens</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      width: 300px;
      padding: 14px;
      background: #fff;
      color: #222;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    #scan-count {
      font-size: 13px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    #flagged-list {
      list-style: none;
      margin-bottom: 12px;
      max-height: 200px;
      overflow-y: auto;
    }
    hr { border: none; border-top: 1px solid #ddd; margin: 10px 0; }
    label { font-size: 11px; color: #666; display: block; margin-bottom: 4px; }
    .whitelist-row { display: flex; gap: 6px; margin-top: 4px; }
    #whitelist-input {
      flex: 1;
      font-size: 12px;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #whitelist-btn {
      font-size: 12px;
      padding: 4px 8px;
      background: #2980b9;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #whitelist-btn:hover { background: #1f6699; }
  </style>
</head>
<body>
  <h1>&#128270; LinkLens</h1>
  <p id="scan-count">Scanning&hellip;</p>
  <ul id="flagged-list"></ul>
  <hr />
  <label>Add domain to whitelist</label>
  <div class="whitelist-row">
    <input id="whitelist-input" type="text" placeholder="domain.com" />
    <button id="whitelist-btn">Add to whitelist</button>
  </div>
  <script src="../../dist/popup/popup.js" type="module"></script>
</body>
</html>
